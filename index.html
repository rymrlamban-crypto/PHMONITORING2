<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pH Monitor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            padding-bottom: 40px;
        }

        /* --- Hamburger Menu --- */
        .menu-btn {
            position: fixed; top: 25px; left: 25px; z-index: 1001;
            background: #1e1e1e; padding: 12px; border-radius: 12px;
            cursor: pointer; border: 1px solid #333;
        }
        .menu-btn div { width: 20px; height: 2px; background: #4CAF50; margin: 4px 0; transition: 0.3s; }

        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #181818; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding-top: 80px; border-right: 1px solid #222;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px 25px; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .sidebar a {
            display: block; padding: 18px 25px; color: #aaa; text-decoration: none;
            font-size: 1.1rem; border-bottom: 1px solid #222; transition: 0.3s;
        }
        .sidebar a.active-link { background: #222; color: #4CAF50; border-left: 5px solid #4CAF50; font-weight: bold; }

        .overlay {
            position: fixed; display: none; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 999;
        }
        .overlay.active { display: block; }

        /* --- Main UI Card --- */
        .app-container { 
            background: linear-gradient(145deg, #1e1e1e, #141414);
            border-radius: 40px; padding: 60px 20px; 
            width: 90%; max-width: 400px;
            text-align: center;
            box-shadow: 20px 20px 60px #0a0a0a, -5px -5px 20px #262626;
            border: 1px solid #333;
            z-index: 1;
            margin-top: 80px;
        }

        #area-title { font-size: 0.9rem; color: #4CAF50; text-transform: uppercase; letter-spacing: 3px; }
        #range-text { font-size: 0.7rem; color: #555; margin-top: 5px; display: block; }

        #ph-value { 
            font-size: 110px; font-weight: 900; margin: 15px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.5s ease;
        }

        #status-box { 
            font-size: 15px; font-weight: 700; padding: 15px 25px; 
            border-radius: 50px; margin-top: 20px;
            display: inline-block; letter-spacing: 1px;
            transition: 0.3s;
        }

        #mute-btn {
            display: block; width: fit-content; margin: 25px auto 0;
            padding: 12px 25px; border-radius: 30px;
            background: #1e1e1e; color: #aaa; font-weight: 600;
            border: 1px solid #333; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;
        }
        #mute-btn.active-mute { background: rgba(244, 67, 54, 0.15); color: #f44336; border-color: #f44336; }

        #sync-time { margin-top: 35px; font-size: 11px; color: #444; font-family: monospace; }

        /* --- LOGS SECTION --- */
        .log-section {
            width: 90%; max-width: 400px;
            margin-top: 30px;
            background: #181818;
            border-radius: 25px;
            padding: 20px;
            border: 1px solid #222;
        }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .log-header h3 { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .clear-btn { background: none; border: 1px solid #333; color: #555; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; }
        
        .log-table { width: 100%; border-collapse: collapse; color: #aaa; font-size: 0.85rem; }
        .log-table th { text-align: left; color: #444; font-size: 0.7rem; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .log-table td { padding: 10px 0; border-bottom: 1px solid #222; }

        /* --- Custom Range Panel --- */
        #custom-panel {
            margin-top: 20px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
            display: none;
            border: 1px dashed #444;
        }
        .custom-inputs { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .custom-inputs input {
            width: 60px; background: #222; border: 1px solid #444; color: white;
            padding: 8px; border-radius: 8px; text-align: center; font-weight: bold;
        }
        .set-btn {
            background: #4CAF50; color: white; border: none; padding: 8px 15px;
            border-radius: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }

        .safe-text { color: #4CAF50; }
        .warning-text { color: #f44336; }
        .safe-box { background: rgba(76, 175, 80, 0.1); color: #4CAF50; border: 1px solid #4CAF50; }
        .warning-box { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid #222; }

        #notif-banner {
            position: fixed; top: 0; width: 100%; background: #4CAF50; color: white; 
            padding: 12px; text-align: center; font-size: 14px; z-index: 2000; cursor: pointer;
            font-weight: bold; border-bottom: 2px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

    <div id="notif-banner" onclick="requestNotif()">🔔 ENABLE PUSH NOTIFICATIONS & SOUND</div>

    <div class="menu-btn" onclick="toggleNav()">
        <div></div><div></div><div></div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleNav()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">Monitoring Mode</div>
        <a href="#" id="link-Drinkable" class="active-link" onclick="selectArea('Drinkable', 'Drinking Water', 6.5, 8.5)">Drinkable Water</a>
        <a href="#" id="link-Plants" onclick="selectArea('Plants', 'Plants/Agri', 5.5, 7.0)">Plants/Agri</a>
        <a href="#" id="link-Pool" onclick="selectArea('Pool', 'Swimming Pool', 7.2, 7.8)">Swimming Pool</a>
        <a href="#" id="link-Custom" onclick="enableCustomMode()">Custom Range</a>
    </nav>

    <div class="app-container">
        <h1 id="area-title">Drinking Water</h1>
        <span id="range-text">Range: 6.5 - 8.5</span>
        
        <div id="custom-panel">
            <div class="custom-inputs">
                <input type="number" id="min-input" step="0.1" placeholder="Min">
                <span style="color:#555">to</span>
                <input type="number" id="max-input" step="0.1" placeholder="Max">
                <button class="set-btn" onclick="applyCustomRange()">SET</button>
            </div>
        </div>

        <div id="ph-value">--</div>
        <div id="status-box">INITIALIZING...</div>
        
        <button id="mute-btn" onclick="toggleMute()">🔇 Mute Alarm</button>
        
        <div id="sync-time">WAITING FOR DATA...</div>
    </div>

    <div class="log-section">
        <div class="log-header">
            <h3>Recent History</h3>
            <button class="clear-btn" onclick="clearLogs()">Clear Logs</button>
        </div>
        <table class="log-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>pH</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="log-body">
            </tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwKfcDl0rNVl9x4Kq9jSQ4BAqAliZglxg",
            databaseURL: "https://rymr-49941-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "rymr-49941"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let minSafe = 6.5;
        let maxSafe = 8.5;
        let isMuted = false;
        let lastLogTime = 0;
        let lastNotifTime = 0; 
        const currentPath = 'ph_monitor/current_ph';
        let dbRef;

        function requestNotif() {
            const sound = document.getElementById('alert-sound');
            sound.play().then(() => {
                sound.pause(); 
                sound.currentTime = 0;
            }).catch(e => console.log("Audio prep failed", e));

            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('notif-banner').style.display = 'none';
                }
            });
        }

        if (Notification.permission === "granted") {
            document.getElementById('notif-banner').style.display = 'none';
        }

        function toggleNav() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function selectArea(areaKey, label, min, max) {
            minSafe = min;
            maxSafe = max;
            document.getElementById('custom-panel').style.display = 'none';
            document.getElementById('area-title').innerText = label;
            document.getElementById('range-text').innerText = `Range: ${min.toFixed(1)} - ${max.toFixed(1)}`;
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active-link'));
            document.getElementById('link-' + areaKey).classList.add('active-link');
            db.ref('ph_monitor/config').update({ mode: areaKey });
            toggleNav();
        }

        function enableCustomMode() {
            document.getElementById('area-title').innerText = "Custom Mode";
            document.getElementById('range-text').innerText = "Enter desired range below";
            document.getElementById('custom-panel').style.display = 'block';
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active-link'));
            document.getElementById('link-Custom').classList.add('active-link');
            toggleNav();
        }

        function applyCustomRange() {
            const min = parseFloat(document.getElementById('min-input').value);
            const max = parseFloat(document.getElementById('max-input').value);

            if (isNaN(min) || isNaN(max)) {
                alert("Please enter valid numbers");
                return;
            }
            if (min >= max) {
                alert("Min must be less than Max");
                return;
            }

            minSafe = min;
            maxSafe = max;
            document.getElementById('range-text').innerText = `Range: ${min.toFixed(1)} - ${max.toFixed(1)}`;
            
            // Sync both mode and new values to Firebase for Arduino to read
            db.ref('ph_monitor/config').update({ 
                mode: 'Custom',
                customMin: min,
                customMax: max 
            });
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('mute-btn');
            db.ref('ph_monitor/config').update({ mute: isMuted });
            btn.innerText = isMuted ? "🔊 Unmute Alarm" : "🔇 Mute Alarm";
            if(isMuted) {
                btn.classList.add('active-mute');
                const sound = document.getElementById('alert-sound');
                sound.pause();
                sound.currentTime = 0;
            } else {
                btn.classList.remove('active-mute');
            }
        }

        function initFirebaseListener() {
            if (dbRef) dbRef.off(); 
            dbRef = db.ref(currentPath);
            dbRef.on('value', (snapshot) => {
                const val = snapshot.val();
                const phDisp = document.getElementById('ph-value');
                const statusDisp = document.getElementById('status-box');
                const timeDisp = document.getElementById('sync-time');
                
                if (val !== null && val !== undefined) {
                    const numericVal = parseFloat(val);
                    phDisp.innerText = numericVal.toFixed(1);
                    timeDisp.innerText = "LAST SYNC: " + new Date().toLocaleTimeString();

                    const isWarning = (numericVal < minSafe || numericVal > maxSafe);

                    if (isWarning) {
                        statusDisp.innerText = "OUT OF RANGE";
                        statusDisp.className = "warning-box";
                        phDisp.className = "warning-text";
                        
                        if (Date.now() - lastNotifTime > 300000) { 
                            if (!isMuted) {
                                const sound = document.getElementById('alert-sound');
                                sound.currentTime = 0; 
                                sound.play().catch(e => console.log("Sound blocked"));
                                
                                setTimeout(() => {
                                    sound.pause();
                                    sound.currentTime = 0;
                                }, 5000);
                            }

                            if (Notification.permission === "granted") {
                                new Notification("⚠️ pH Alert: " + numericVal.toFixed(1), {
                                    body: "Value is outside of your set limits!"
                                });
                            }

                            if ("vibrate" in navigator && !isMuted) navigator.vibrate([300, 100, 300]);
                            lastNotifTime = Date.now();
                        }
                    } else {
                        statusDisp.innerText = "STATUS: SAFE";
                        statusDisp.className = "safe-box";
                        phDisp.className = "safe-text";
                    }

                    if (Date.now() - lastLogTime > 600000) { 
                        db.ref('ph_monitor/ph_logs').push({
                            val: numericVal,
                            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                            status: isWarning ? "Warning" : "Safe"
                        });
                        lastLogTime = Date.now();
                    }
                } else {
                    phDisp.innerText = "--";
                    statusDisp.innerText = "OFFLINE";
                    statusDisp.className = "";
                    timeDisp.innerText = "CHECK SENSOR CONNECTION";
                }
            });

            db.ref('ph_monitor/config/mute').on('value', (snapshot) => {
                isMuted = snapshot.val() || false;
                const btn = document.getElementById('mute-btn');
                btn.innerText = isMuted ? "🔊 Unmute Alarm" : "🔇 Mute Alarm";
                if(isMuted) btn.classList.add('active-mute');
                else btn.classList.remove('active-mute');
            });

            // Added listener to pull existing Custom Ranges from Firebase on refresh
            db.ref('ph_monitor/config').on('value', (snapshot) => {
                const config = snapshot.val();
                if (config && config.mode === 'Custom') {
                    if (config.customMin !== undefined) minSafe = config.customMin;
                    if (config.customMax !== undefined) maxSafe = config.customMax;
                    document.getElementById('range-text').innerText = `Range: ${minSafe.toFixed(1)} - ${maxSafe.toFixed(1)}`;
                }
            });

            db.ref('ph_monitor/ph_logs').limitToLast(10).on('value', (snapshot) => {
                const logBody = document.getElementById('log-body');
                logBody.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const row = `<tr>
                        <td>${data.time}</td>
                        <td style="font-weight:bold">${data.val.toFixed(1)}</td>
                        <td class="${data.status === 'Warning' ? 'warning-text' : 'safe-text'}">${data.status}</td>
                    </tr>`;
                    logBody.insertAdjacentHTML('afterbegin', row); 
                });
            });
        }

        function clearLogs() {
            if(confirm("Clear all log history?")) {
                db.ref('ph_monitor/ph_logs').remove();
            }
        }

        initFirebaseListener();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
        }
    </script>
</body>
</html>
