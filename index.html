<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH Monitor Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; /* Dark mode is easier on mobile batteries */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .gauge-container { 
            background: #1e1e1e; 
            border-radius: 30px; 
            padding: 40px 20px; 
            width: 100%;
            max-width: 400px; /* Perfect for mobile width */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }

        h1 { font-size: 1.2rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        #ph-value { 
            font-size: 100px; 
            font-weight: 800; 
            margin: 10px 0; 
            transition: color 0.5s ease;
        }

        #status { 
            font-size: 18px; 
            font-weight: bold;
            padding: 15px; 
            border-radius: 50px; 
            margin-top: 20px;
            display: inline-block;
            width: 90%;
        }

        #timestamp {
            margin-top: 25px;
            font-size: 12px;
            color: #555;
        }

        /* Status Colors */
        .safe { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .warning { background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
    </style>
</head>
<body>

    <div class="gauge-container">
        <h1>Current pH</h1>
        <div id="ph-value">0.0</div>
        <div id="status">CONNECTING...</div>
        <div id="timestamp">Last sync: ---</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwKfcDl0rNVl9x4Kq9jSQ4BAqAliZglxg",
            databaseURL: "https://rymr-49941-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "rymr-49941"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('ph_monitor/current_ph').on('value', (snapshot) => {
            const val = snapshot.val();
            const phDisp = document.getElementById('ph-value');
            const statusDisp = document.getElementById('status');
            const timeDisp = document.getElementById('timestamp');
            
            if (val !== null) {
                phDisp.innerText = val.toFixed(1);
                
                // Update Timestamp
                const now = new Date();
                timeDisp.innerText = "Last sync: " + now.toLocaleTimeString();

                // Mobile Color Logic
                if (val < 6.0 || val > 8.0) {
                    statusDisp.innerText = "OUT OF RANGE";
                    statusDisp.className = "warning";
                    phDisp.style.color = "#f44336";
                } else {
                    statusDisp.innerText = "NORMAL";
                    statusDisp.className = "safe";
                    phDisp.style.color = "#4CAF50";
                }
            }
        });
    </script>
</body>
</html>
