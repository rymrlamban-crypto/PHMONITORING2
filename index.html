<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pH Monitor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container { 
            background: linear-gradient(145deg, #1e1e1e, #141414);
            border-radius: 40px; 
            padding: 50px 20px; 
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 20px 20px 60px #0a0a0a, -5px -5px 20px #262626;
            border: 1px solid #333;
        }

        h1 { font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }

        #ph-value { 
            font-size: 110px; 
            font-weight: 900; 
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }

        #status-box { 
            font-size: 16px; 
            font-weight: 700;
            padding: 15px 25px; 
            border-radius: 50px; 
            margin-top: 30px;
            display: inline-block;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        #sync-time {
            margin-top: 35px;
            font-size: 11px;
            color: #444;
            font-family: monospace;
        }

        /* Dynamic Classes */
        .safe-text { color: #4CAF50; }
        .warning-text { color: #f44336; }
        .safe-box { background: rgba(76, 175, 80, 0.1); color: #4CAF50; border: 1px solid #4CAF50; }
        .warning-box { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid #f44336; box-shadow: 0 0 15px rgba(244, 67, 54, 0.2); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Live pH Level</h1>
        <div id="ph-value">--</div>
        <div id="status-box">INITIALIZING...</div>
        <div id="sync-time">WAITING FOR DATA...</div>
    </div>

    <script>
        // Your Firebase Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyBwKfcDl0rNVl9x4Kq9jSQ4BAqAliZglxg",
            databaseURL: "https://rymr-49941-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "rymr-49941"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('ph_monitor/current_ph').on('value', (snapshot) => {
            const val = snapshot.val();
            const phDisp = document.getElementById('ph-value');
            const statusDisp = document.getElementById('status-box');
            const timeDisp = document.getElementById('sync-time');
            
            if (val !== null) {
                phDisp.innerText = val.toFixed(1);
                timeDisp.innerText = "LAST SYNC: " + new Date().toLocaleTimeString();

                if (val < 6.0 || val > 8.0) {
                    statusDisp.innerText = "OUT OF RANGE";
                    statusDisp.className = "warning-box";
                    phDisp.className = "warning-text";
                    // Vibration alert for Android
                    if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
                } else {
                    statusDisp.innerText = "STATUS: NORMAL";
                    statusDisp.className = "safe-box";
                    phDisp.className = "safe-text";
                }
            }
        });

        // Register Service Worker for PWA Installation
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
